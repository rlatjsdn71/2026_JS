<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/60bdabfed7.js" crossorigin="anonymous"></script>
    <link href="./css/layout5.css" rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="asdf"></div>
    <div class="card-background">
        <div class="card-box">
            <img src="./img/card1-1.png" alt="">
        </div>
        <div class="card-box">
            <img src="./img/card2-1.png" alt="">
        </div>
        <div class="card-box">
            <img src="./img/card3-1.png" alt="">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"
        integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>

    <script>
        $(window).scroll(function () {
            let scroll = $(window).scrollTop()
            let scale_1 = 1 - (scroll - 650) / 5000
            let scale_2 = 1 - (scroll - 1300) / 5000

            //650~1150 사이에서 opacity의 값을 1에서 0으로 서서히 줄인다.
            $('.card-box').eq(0).css('opacity', 1 - ((scroll - 650) / 400));
            if (scale_1 < 1)
                $('.card-box').eq(0).css('transform', `scale(${scale_1})`);



            //1300~1800 사이에서 opacity의 값을 1에서 0으로 서서히 줄인다.
            $('.card-box').eq(1).css('opacity', 1 - ((scroll - 1300) / 400));
            if (scale_2 < 1)
                $('.card-box').eq(1).css('transform', `scale(${scale_2})`);
        })
    </script>
</body>

</html>
