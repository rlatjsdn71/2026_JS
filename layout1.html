<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/layout1.css">
</head>

<body>
    <div class="alert-box" id="alert-box">
        <p id="alert-box-p">박스 박스 박스 박스</p>
        <button id="close-button">close</button>
    </div>
    <button onclick="box_display('alert-box', 'block','아이디 입력하세용')">button1</button>
    <button onclick="box_display('alert-box', 'block','비밀번호 입력하세용')">button2</button>
    

    <script>

        document.getElementById('close-button').addEventListener('click', function(){
            box_display('alert-box','none');
        })

        function box_display(id, display, content='') {
            document.getElementById(id).style.display = display;
            document.getElementById(id+'-p').innerHTML = content;
        }

    </script>
</body>

</html>
